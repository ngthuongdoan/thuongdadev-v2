services:
  thuongdadev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - .:/app
      - thuongdadev_node_modules:/app/node_modules
      - thuongdadev_astro:/app/.astro

volumes:
  thuongdadev_node_modules:
  thuongdadev_astro:
