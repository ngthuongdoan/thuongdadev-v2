name: Continuous Integration

on:
  # Run on all branches except master for quality checks
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  quality:
    name: Lint, type check and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test